name: snowflake-migration-demo
 
# Controls when the action will run.
on:
  push:
    branches:
      - main
    paths:
      - 'deploy/**'
 
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
 
jobs:
  deploy-snowflake-changes-job:
    runs-on: ubuntu-latest
 
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Use Python 3.11.x
        uses: actions/setup-python@v5
        with:
          python-version: 3.11.x
 
      - name: Run schemachange
        env:
          SF_ACCOUNT: ${{ secrets.SF_ACCOUNT }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_ROLE: ${{ secrets.SF_ROLE }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_WAREHOUSE: ${{ secrets.SF_WAREHOUSE }}
          SF_DATABASE: ${{ secrets.SF_DATABASE }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
         
        run: |
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          python --version
          echo "Step 1: Installing schemachange"
          pip install schemachange
 
          echo "Step 2: Writing deploy/connections.toml"
          echo "$SNOWFLAKE_PRIVATE_KEY" > /tmp/private_key.p8
          chmod 0600 /tmp/private_key.p8
          printf '%s\n' '[default]' 'type = "snowflake"' 'account = "'$SF_ACCOUNT'"' 'user = "'$SF_USERNAME'"' 'role = "'$SF_ROLE'"' 'warehouse = "'$SF_WAREHOUSE'"' 'database = "'$SF_DATABASE'"' 'schema = "'$SF_DATABASE'"' 'private_key_path = "/tmp/private_key.p8"' 'private_key_passphrase = "'$SNOWFLAKE_PRIVATE_KEY_PASSPHRASE'"' > $GITHUB_WORKSPACE/deploy/connections.toml
          chmod 0600 $GITHUB_WORKSPACE/deploy/connections.toml
 
          echo "Step 3: Running schemachange"
          schemachange deploy -f $GITHUB_WORKSPACE/deploy --connections-file-path $GITHUB_WORKSPACE/deploy/connections.toml --connection-name default -c $SF_DATABASE.SCHEMACHANGE.CHANGE_HISTORY --create-change-history-table
