name: snowflake-migration-demo

# Controls when the action will run. 
on:
  push:
    branches:
      - main
    paths:
      - 'deploy/**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy-snowflake-changes-job:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Use Python 3.8.x
        uses: actions/setup-python@v2.2.1
        with:
          python-version: 3.8.x

      - name: Setup Snowflake connections.toml
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/connections.toml << 'EOF'
          [default]
          account = "${{ secrets.SF_ACCOUNT }}"
          user = "${{ secrets.SF_USERNAME }}"
          password = "${{ secrets.SF_PASSWORD }}"
          role = "${{ secrets.SF_ROLE }}"
          warehouse = "${{ secrets.SF_WAREHOUSE }}"
          database = "${{ secrets.SF_DATABASE }}"
          EOF
          chmod 600 ~/.snowflake/connections.toml

      - name: Run schemachange
        env:
          SF_ACCOUNT: ${{ secrets.SF_ACCOUNT }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_ROLE: ${{ secrets.SF_ROLE }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_WAREHOUSE: ${{ secrets.SF_WAREHOUSE }}
          SF_DATABASE: ${{ secrets.SF_DATABASE }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
         
        run: |
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          python --version
          echo "Step 1: Installing schemachange"
          pip install schemachange

          echo "Step 2: Writing deploy/connections.toml"
          cat > $GITHUB_WORKSPACE/deploy/connections.toml <<'EOFTOML'

          type = "snowflake"
          account = "$SF_ACCOUNT"
          user = "$SF_USERNAME"
          role = "$SF_ROLE"
          warehouse = "$SF_WAREHOUSE"
          database = "$SF_DATABASE"
          schema = "$SF_DATABASE"
          private_key_passphrase = "$SNOWFLAKE_PRIVATE_KEY_PASSPHRASE"
          EOFTOML
                    echo "$SNOWFLAKE_PRIVATE_KEY" > /tmp/private_key.p8
                    sed -i 's/private_key_passphrase = .*/&\nprivate_key_path = "\/tmp\/private_key.p8"/' $GITHUB_WORKSPACE/deploy/connections.toml

                    echo "Step 3: Running schemachange"
          schemachange deploy -f $GITHUB_WORKSPACE/deploy --connections-file-path $GITHUB_WORKSPACE/deploy/connections.toml --connection-name default -c $SF_DATABASE.SCHEMACHANGE.CHANGE_HISTORY --create-change-history-table
